[application]

# dioxus project name
name = "Onlivfe"

# default platfrom
# you can also use `dioxus serve/build --platform XXX` to use other platform
# value: web | desktop
default_platform = "desktop"

# Web `build` & `serve` dist path
out_dir = "gen/dist"

# resource (static) file folder
asset_dir = "res"

[web.app]

# HTML title tag content
title = "Contacts + social platforms + identity management"

index_on_404 = true

[web.watcher]

watch_path = ["src"]

# include `assets` in web platform
[web.resource]

# CSS style file
style = []

# Javascript code file
script = []

[web.resource.dev]

# Javascript code file
# serve: [dev-server] only
script = []

[application.plugins]

available = true

required = []
